name: Avaliação do playbook de prompts

on:
  pull_request:
    paths:
      - "devops/**"
  push:
    branches: [main]
    paths:
      - "devops/**"
  workflow_dispatch:

jobs:
  # Caminho crítico do PR: roda só os prompts alterados (rápido e barato).
  eval-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Detecta a PASTA de qualquer arquivo alterado (prompt.md, config, fixture),
      # para que uma regressao no prompt.md tambem dispare a reavaliacao.
      - name: Detectar pastas de prompt alteradas
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: devops/**
          dir_names: true
          dir_names_max_depth: 2

      - name: Montar lista de configs afetados
        id: cfgs
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          list=""
          for dir in ${{ steps.changed.outputs.all_changed_files }}; do
            [ -f "$dir/promptfooconfig.yaml" ] && list="$list $dir/promptfooconfig.yaml"
          done
          echo "list=$(echo $list | xargs)" >> "$GITHUB_OUTPUT"

      - name: Rodar avaliacao (promptfoo-action comenta no PR)
        if: steps.cfgs.outputs.list != ''
        uses: promptfoo/promptfoo-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          config: ${{ steps.cfgs.outputs.list }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          no-share: true
          cache-path: .promptfoo-cache
          fail-on-threshold: 100

  # Rede de seguranca: roda a suite INTEIRA no push para main e no dispatch manual.
  eval-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rodar a suite completa
        run: |
          status=0
          for cfg in devops/*/promptfooconfig.yaml; do
            echo "::group::$cfg"
            npx -y promptfoo@latest eval -c "$cfg" --no-cache || status=1
            echo "::endgroup::"
          done
          exit $status
